name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned app
        run: |
          xcodebuild build \
            -project FMHYStream.xcodeproj \
            -scheme FMHYStream \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR=$PWD/build

      - name: Create IPA
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r FMHYStream.ipa Payload
          ls -la FMHYStream.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FMHYStream-IPA
          path: FMHYStream.ipa

name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build unsigned app
        run: |
          set -euo pipefail
          xcodebuild clean build \
            -project FMHYStream.xcodeproj \
            -scheme FMHYStream \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            BUILD_DIR=$PWD/build \
            2>&1 | tail -30

      - name: Create IPA
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found! Listing build dir:"
            find build -maxdepth 4 -type d
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r FMHYStream.ipa Payload
          ls -la FMHYStream.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FMHYStream-IPA
          path: FMHYStream.ipa

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FMHY Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0a;--bg-el:#141414;--bg-card:#181818;--glass:rgba(0,0,0,.6);
--primary:hsl(0,72.2%,50.6%);--primary-dark:#850000;
--text:#fafafa;--text-sec:#b3b3b3;--text-muted:#808080;--border:#333;
--rad:8px;--rad-sm:5px;--font:'Lexend',sans-serif;--font-h:'Montserrat',sans-serif;
--nav-h:60px;--pad:2rem;--max-w:1400px;
--ease:.3s cubic-bezier(.4,0,.2,1)
}
html{font-family:var(--font);background:var(--bg);color:var(--text);
-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
scrollbar-width:thin;scrollbar-color:#333 transparent}
body{min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:0 0}
::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
img{display:block;max-width:100%}a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:0 0;color:inherit}
.container{width:100%;max-width:var(--max-w);margin:0 auto;padding:0 var(--pad)}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;
display:flex;align-items:center;padding:0 var(--pad);
background:linear-gradient(180deg,rgba(0,0,0,.85) 0,transparent);transition:background var(--ease)}
.nav.scrolled{background:rgba(10,10,10,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.04)}
.nav-logo{font-family:var(--font-h);font-size:1.4rem;font-weight:800;
background:linear-gradient(90deg,#fff,#999);-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text;margin-right:2rem;white-space:nowrap;flex-shrink:0}
.nav-tabs{display:flex;gap:2px;list-style:none}
.nav-tab{padding:8px 16px;font-size:.8125rem;font-weight:500;color:var(--text-sec);
border-radius:6px;transition:all var(--ease);cursor:pointer;white-space:nowrap}
.nav-tab:hover{color:var(--text)}.nav-tab.active{color:#fff;background:rgba(255,255,255,.1)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.nav-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
border-radius:50%;transition:background var(--ease)}
.nav-btn:hover{background:rgba(255,255,255,.1)}.nav-btn svg{width:20px;height:20px}

/* HERO */
.hero{position:relative;width:100%;height:70vh;min-height:420px;max-height:720px;overflow:hidden}
.hero .swiper{height:100%}.hero .swiper-slide{position:relative}
.hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%}
.hero-grad{position:absolute;inset:0;
background:linear-gradient(0deg,var(--bg) 0,transparent 50%),linear-gradient(90deg,rgba(10,10,10,.85) 0,transparent 55%)}
.hero-ct{position:absolute;bottom:14%;left:var(--pad);max-width:480px;z-index:2}
.hero-logo{max-width:280px;max-height:100px;margin-bottom:14px;filter:drop-shadow(0 2px 10px rgba(0,0,0,.6))}
.hero-title{font-family:var(--font-h);font-size:2.4rem;font-weight:800;line-height:1.1;
margin-bottom:10px;text-shadow:0 3px 12px rgba(0,0,0,.8)}
.hero-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:.8125rem;color:var(--text-sec)}
.hero-star{color:#ffd700;font-weight:600;display:flex;align-items:center;gap:3px}
.hero-tag{padding:2px 8px;background:rgba(255,255,255,.12);border-radius:4px;font-size:.6875rem}
.hero-desc{font-size:.875rem;line-height:1.6;color:var(--text-sec);
display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:18px}
.hero-btns{display:flex;gap:10px}
.btn-play{display:flex;align-items:center;gap:8px;padding:10px 24px;
background:var(--primary);color:#fff;font-weight:600;font-size:.875rem;
border-radius:var(--rad);transition:all var(--ease)}
.btn-play:hover{filter:brightness(1.15);transform:scale(1.04)}
.btn-play:focus{outline:2px solid var(--primary);outline-offset:3px}
.btn-info{display:flex;align-items:center;gap:8px;padding:10px 24px;
background:rgba(255,255,255,.12);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
color:#fff;font-weight:500;font-size:.875rem;border-radius:var(--rad);transition:all var(--ease)}
.btn-info:hover{background:rgba(255,255,255,.22)}
.hero .swiper-pagination{bottom:20px!important}
.hero .swiper-pagination-bullet{width:7px;height:7px;background:rgba(255,255,255,.45);opacity:1;transition:all .3s}
.hero .swiper-pagination-bullet-active{width:22px;border-radius:4px;background:var(--primary)}

/* CONTENT */
.content{position:relative;z-index:2;margin-top:-60px;padding-bottom:80px}
.section{padding:0 var(--pad);margin-bottom:1.75rem}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-family:var(--font-h);font-size:1.15rem;font-weight:700;
background:linear-gradient(90deg,red,#850000);-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.row .swiper-slide{width:auto}
.row .swiper-wrapper{align-items:stretch}

/* CARD */
.card{position:relative;width:155px;cursor:pointer;transition:transform var(--ease)}
.card:hover{transform:translateY(-5px)}
.card:focus-visible{outline:2px solid var(--primary);outline-offset:4px;border-radius:var(--rad-sm)}
.card-img{position:relative;width:100%;aspect-ratio:2/3;border-radius:var(--rad-sm);overflow:hidden;background:var(--bg-card)}
.card-img img{width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform .35s ease}
.card:hover .card-img img{transform:scale(1.08)}
.card-badge{position:absolute;top:6px;font-size:.625rem;font-weight:600;padding:3px 7px;
border-radius:var(--rad-sm);background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);color:#fff;z-index:2;letter-spacing:.2px}
.card-badge.tp{left:6px;text-transform:uppercase}.card-badge.rt{right:6px;display:flex;align-items:center;gap:2px}
.card-badge.rt svg{width:9px;height:9px;fill:#ffd700}
.card-name{margin-top:7px;font-size:.8125rem;font-weight:500;line-height:1.35;
display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
color:var(--text-sec);transition:color var(--ease)}
.card:hover .card-name{color:var(--text)}

/* LANDSCAPE CARD */
.card.land{width:275px}.card.land .card-img{aspect-ratio:16/9}

/* TOP 10 */
.t10{display:flex;align-items:flex-end;width:210px}
.t10-n{font-family:var(--font-h);font-size:5.5rem;font-weight:800;line-height:.78;
color:transparent;-webkit-text-stroke:2px #555;margin-right:-18px;z-index:1;position:relative;flex-shrink:0}
.t10 .card{width:115px}

/* DETAIL */
.detail{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);
backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;overflow-y:auto}
.detail.open{display:block}
.detail-wrap{max-width:880px;margin:0 auto;min-height:100vh;position:relative}
.detail-bd{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.detail-bdg{position:absolute;top:0;left:0;right:0;height:56.25vw;max-height:495px;
background:linear-gradient(0deg,var(--bg) 0,transparent 100%);pointer-events:none}
.detail-x{position:fixed;top:14px;right:14px;width:42px;height:42px;
display:flex;align-items:center;justify-content:center;
background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
border-radius:50%;z-index:210;transition:background var(--ease)}
.detail-x:hover{background:rgba(255,255,255,.18)}
.detail-body{padding:0 var(--pad) 50px;margin-top:-100px;position:relative}
.detail-h{font-family:var(--font-h);font-size:1.85rem;font-weight:700;margin-bottom:10px}
.detail-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;font-size:.8125rem;color:var(--text-sec)}
.detail-meta .rt{color:#ffd700;font-weight:600}
.detail-genres{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.detail-genre{padding:4px 12px;background:rgba(255,255,255,.08);border-radius:20px;font-size:.75rem;color:var(--text-sec)}
.detail-desc{font-size:.875rem;line-height:1.7;color:var(--text-sec);margin-bottom:20px}
.detail-acts{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.sources-h{font-size:.875rem;font-weight:600;margin-bottom:10px;color:var(--text)}
.src-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;margin-bottom:20px}
.src-btn{display:flex;align-items:center;justify-content:center;padding:9px 10px;
background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);
border-radius:var(--rad);font-size:.75rem;font-weight:500;color:var(--text-sec);
transition:all var(--ease);text-align:center}
.src-btn:hover{background:rgba(255,255,255,.14);color:var(--text);border-color:rgba(255,255,255,.16)}
.src-btn.on{background:var(--primary);border-color:var(--primary);color:#fff}
.anime-h{font-size:.75rem;font-weight:600;color:var(--primary);margin-bottom:8px;margin-top:14px}

/* EPISODE */
.ep-sel{margin-top:16px}
.s-sel{padding:7px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
border-radius:var(--rad);color:var(--text);font-family:var(--font);font-size:.8125rem;margin-bottom:10px;outline:0}
.s-sel option{background:#222;color:var(--text)}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:5px}
.ep-btn{padding:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);
border-radius:4px;font-size:.75rem;color:var(--text-sec);text-align:center;transition:all var(--ease)}
.ep-btn:hover{background:rgba(255,255,255,.14);color:var(--text)}
.ep-btn.on{background:var(--primary);border-color:var(--primary);color:#fff}

/* PLAYER */
.player{position:fixed;inset:0;z-index:300;background:#000;display:none;flex-direction:column}
.player.open{display:flex}
.player-hd{display:flex;align-items:center;padding:6px 14px;background:rgba(0,0,0,.96);min-height:46px;z-index:2;gap:8px}
.player-ti{font-size:.8125rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 8px}
.player-tabs{display:flex;gap:3px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.player-tabs::-webkit-scrollbar{display:none}
.p-tab{padding:5px 10px;font-size:.6875rem;font-weight:500;color:var(--text-muted);
background:rgba(255,255,255,.07);border-radius:4px;white-space:nowrap;transition:all var(--ease)}
.p-tab:hover{color:var(--text);background:rgba(255,255,255,.13)}
.p-tab.on{color:#fff;background:var(--primary)}
.player-x{flex-shrink:0;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background var(--ease)}
.player-x:hover{background:rgba(255,255,255,.1)}
.player-frame{flex:1;width:100%;border:none;background:#000}

/* SEARCH */
.search{position:fixed;inset:0;z-index:150;background:rgba(8,8,8,.98);display:none;flex-direction:column;padding:70px var(--pad) 40px}
.search.open{display:flex}
.search-bar{display:flex;align-items:center;max-width:580px;margin:0 auto;width:100%;
padding:11px 18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
border-radius:12px;gap:10px;margin-bottom:28px}
.search-bar svg{flex-shrink:0;color:var(--text-muted)}
.search-in{flex:1;background:0 0;border:none;outline:0;font-size:.9375rem;color:var(--text);font-family:var(--font)}
.search-in::placeholder{color:var(--text-muted)}
.search-x{position:fixed;top:16px;right:16px;width:42px;height:42px;
display:flex;align-items:center;justify-content:center;border-radius:50%;z-index:160}
.search-x:hover{background:rgba(255,255,255,.1)}
.search-res{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:16px;max-width:1100px;margin:0 auto;width:100%;overflow-y:auto;padding-bottom:40px}

/* SIDEBAR */
.sidebar{position:fixed;top:0;right:-320px;width:320px;height:100%;background:var(--bg-el);
z-index:250;transition:right var(--ease);overflow-y:auto;padding:20px}
.sidebar.open{right:0}
.sb-bk{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:240;display:none}
.sb-bk.open{display:block}
.sb-h{font-size:.6875rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 6px}
.sb-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rad);
font-size:.8125rem;color:var(--text-sec);transition:all var(--ease)}
.sb-link:hover{background:rgba(255,255,255,.07);color:var(--text)}

/* MOBILE NAV */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:54px;
background:rgba(10,10,10,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.04);z-index:100;justify-content:space-around;
align-items:center;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0)}
.mob-item{display:flex;flex-direction:column;align-items:center;gap:3px;
padding:4px 10px;color:var(--text-muted);font-size:.5625rem;font-weight:500;transition:color var(--ease)}
.mob-item.on{color:var(--primary)}.mob-item svg{width:20px;height:20px}

/* EMPTY */
.empty{text-align:center;padding:80px 0;color:var(--text-muted)}
.empty p:nth-child(2){font-size:.8125rem;margin-top:6px}

/* RESPONSIVE */
@media(max-width:768px){
:root{--pad:1rem;--nav-h:54px}
.nav-tabs{display:none}
.hero{height:52vh;min-height:300px}
.hero-title{font-size:1.6rem}
.hero-ct{max-width:75%;bottom:18%}
.hero-desc{-webkit-line-clamp:2;font-size:.8rem}
.card{width:125px}.card.land{width:230px}
.t10{width:170px}.t10-n{font-size:4rem}.t10 .card{width:95px}
.section-title{font-size:1rem}
.detail-h{font-size:1.4rem}
.src-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
.mob-nav{display:flex}.content{padding-bottom:70px}
}
@media(min-width:1200px){
.card{width:175px}.card.land{width:310px}
.t10{width:250px}.t10 .card{width:135px}
}

/* ANIM */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.detail.open .detail-wrap{animation:fadeIn .3s ease}
.detail.open .detail-body{animation:slideUp .4s ease .1s both}
.shimmer{background:linear-gradient(90deg,var(--bg-card) 25%,#252525 50%,var(--bg-card) 75%);
background-size:200% 100%;animation:sh 1.5s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="nav">
<span class="nav-logo">FMHY</span>
<ul class="nav-tabs" id="navTabs">
<li class="nav-tab active" data-tab="home">Home</li>
<li class="nav-tab" data-tab="movies">Movies</li>
<li class="nav-tab" data-tab="tv">TV Shows</li>
<li class="nav-tab" data-tab="anime">Anime</li>
<li class="nav-tab" data-tab="mylist">My List</li>
</ul>
<div class="nav-right">
<button class="nav-btn" id="searchBtn" aria-label="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
<button class="nav-btn" id="menuBtn" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
</div>
</nav>

<!-- SIDEBAR -->
<div class="sb-bk" id="sbBk"></div>
<aside class="sidebar" id="sidebar">
<button style="float:right;padding:8px" onclick="closeSB()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
<div style="clear:both"></div>
<div class="sb-h">Browse</div>
<a class="sb-link" onclick="go('home')">Home</a>
<a class="sb-link" onclick="go('movies')">Movies</a>
<a class="sb-link" onclick="go('tv')">TV Shows</a>
<a class="sb-link" onclick="go('anime')">Anime</a>
<a class="sb-link" onclick="go('mylist')">My List</a>
<div class="sb-h">Anime Sites</div>
<a class="sb-link" onclick="openExt('https://animekai.to/home')">AnimeKai</a>
<a class="sb-link" onclick="openExt('https://animepahe.pw/')">AnimePahe</a>
<a class="sb-link" onclick="openExt('https://hianime.to/home')">HiAnime</a>
<div class="sb-h">Info</div>
<a class="sb-link" onclick="openExt('https://fmhy.net/')">FMHY Wiki</a>
<div style="margin-top:20px;font-size:.6875rem;color:var(--text-muted)">FMHY Stream v8</div>
</aside>

<!-- HERO -->
<section class="hero" id="hero">
<div class="swiper hero-swiper"><div class="swiper-wrapper" id="heroSlides"></div><div class="swiper-pagination"></div></div>
</section>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- DETAIL -->
<div class="detail" id="detail">
<button class="detail-x" onclick="closeDt()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
<div class="detail-wrap">
<img class="detail-bd" id="dtBd" alt="">
<div class="detail-bdg"></div>
<div class="detail-body" id="dtBody"></div>
</div>
</div>

<!-- PLAYER -->
<div class="player" id="player">
<div class="player-hd">
<button class="player-x" onclick="closePl()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
<span class="player-ti" id="plTi"></span>
<div class="player-tabs" id="plTabs"></div>
</div>
<iframe class="player-frame" id="plFrame" allowfullscreen allow="autoplay;fullscreen;picture-in-picture;encrypted-media"></iframe>
</div>

<!-- SEARCH -->
<div class="search" id="searchOv">
<button class="search-x" onclick="closeSr()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
<div class="search-bar">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input class="search-in" id="searchIn" type="text" placeholder="Search movies, shows, anime...">
</div>
<div class="search-res" id="searchRes"></div>
</div>

<!-- MOBILE NAV -->
<nav class="mob-nav" id="mobNav">
<button class="mob-item on" data-tab="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><span>Home</span></button>
<button class="mob-item" data-tab="movies"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg><span>Movies</span></button>
<button class="mob-item" data-tab="tv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg><span>TV</span></button>
<button class="mob-item" data-tab="anime"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg><span>Anime</span></button>
<button class="mob-item" data-tab="mylist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg><span>My List</span></button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="data.js"></script>
<script>
(function(){
'use strict';
const D=window.STREAM_DATA,IMG='https://image.tmdb.org/t/p/';
const P=(u,q=60)=>`https://wsrv.nl/?url=${encodeURIComponent(u)}&output=webp&q=${q}&n=-1`;
const poster=(p,s='w342')=>p?P(IMG+s+p,50):'';
const backdrop=(p,s='w780')=>p?P(IMG+s+p,65):'';
const heroBg=(p)=>p?P(IMG+'w1280'+p,70):'';
const logo=(p)=>p?P(IMG+'w300'+p,80):'';

let tab='home',myList=JSON.parse(localStorage.getItem('fl')||'[]'),cur=null,heroSw=null;

const SRCS=[
{n:'Videasy',m:'https://player.videasy.net/movie/{id}',t:'https://player.videasy.net/tv/{id}/{s}/{e}'},
{n:'VidSrc',m:'https://vidsrc.icu/embed/movie/{id}',t:'https://vidsrc.icu/embed/tv/{id}/{s}/{e}'},
{n:'VidSrc Pro',m:'https://vidsrc.pro/embed/movie/{id}',t:'https://vidsrc.pro/embed/tv/{id}/{s}/{e}'},
{n:'Embed.su',m:'https://embed.su/embed/movie/{id}',t:'https://embed.su/embed/tv/{id}/{s}/{e}'},
{n:'AutoEmbed',m:'https://player.autoembed.cc/embed/movie/{id}',t:'https://player.autoembed.cc/embed/tv/{id}/{s}/{e}'},
{n:'SuperEmbed',m:'https://multiembed.mov/?video_id={id}&tmdb=1',t:'https://multiembed.mov/?video_id={id}&tmdb=1&s={s}&e={e}'},
{n:'2Embed',m:'https://www.2embed.cc/embed/{id}',t:'https://www.2embed.cc/embedtv/{id}&s={s}&e={e}'},
{n:'NontonGo',m:'https://www.nontongo.win/embed/movie/{id}',t:'https://www.nontongo.win/embed/tv/{id}/{s}/{e}'},
{n:'Vidlink',m:'https://vidlink.pro/movie/{id}',t:'https://vidlink.pro/tv/{id}/{s}/{e}'},
{n:'MoviesAPI',m:'https://moviesapi.club/movie/{id}',t:'https://moviesapi.club/tv/{id}-{s}-{e}'}
];
const ANIME_SRCS=[
{n:'AnimeKai',u:'https://animekai.to/browser?keyword={t}'},
{n:'AnimePahe',u:'https://animepahe.pw/search?q={t}'},
{n:'HiAnime',u:'https://hianime.to/search?keyword={t}'},
{n:'Miruro',u:'https://www.miruro.tv/search?query={t}'}
];

function title(i){return i.title||i.name||''}
function year(i){return(i.release_date||i.first_air_date||'').slice(0,4)}
function rate(i){return i.vote_average?i.vote_average.toFixed(1):'N/A'}
function genres(i){return(i.genre_ids||[]).map(g=>D.genre_map[g]||'').filter(Boolean)}
function isAni(i){return(i.genre_ids||[]).includes(16)}

function allItems(){
const a=[],s=new Set();
const add=arr=>{if(!arr)return;arr.forEach(i=>{if(!s.has(i.id)){s.add(i.id);a.push(i)}})};
add(D.trending);add(D.pop_movie);add(D.top_movie);add(D.now_playing);add(D.upcoming);
add(D.pop_tv);add(D.top_tv);add(D.airing);add(D.anime);add(D.kdrama);
if(D.genres)Object.values(D.genres).forEach(v=>add(v));
return a;
}

const svgStar='<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
const svgPlay='<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
const svgInfo='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';

/* RENDER HERO */
function renderHero(){
const el=document.getElementById('heroSlides');
if(!D.heroes||!D.heroes.length)return;
el.innerHTML=D.heroes.map(i=>{
const g=genres(i).slice(0,2);
return`<div class="swiper-slide">
<img class="hero-bg" src="${heroBg(i.backdrop_path)}" alt="" loading="eager">
<div class="hero-grad"></div>
<div class="hero-ct">
${i.logo?`<img class="hero-logo" src="${logo(i.logo)}" alt="${title(i)}">`:`<h2 class="hero-title">${title(i)}</h2>`}
<div class="hero-meta">
<span class="hero-star">★ ${rate(i)}</span>
<span>${year(i)}</span>
<span>${i.media_type==='movie'?'Movie':'TV'}</span>
${g.map(x=>`<span class="hero-tag">${x}</span>`).join('')}
</div>
<p class="hero-desc">${i.overview||''}</p>
<div class="hero-btns">
<button class="btn-play" onclick="event.stopPropagation();openDt(${i.id},'${i.media_type}')">${svgPlay} Play</button>
<button class="btn-info" onclick="event.stopPropagation();openDt(${i.id},'${i.media_type}')">${svgInfo} More Info</button>
</div>
</div>
</div>`}).join('');
heroSw=new Swiper('.hero-swiper',{loop:true,autoplay:{delay:7000,disableOnInteraction:false},
effect:'fade',fadeEffect:{crossFade:true},pagination:{el:'.swiper-pagination',clickable:true},speed:900});
}

/* RENDER CARD */
function cardHtml(i,opts){
const t=title(i),r=rate(i),tp=i.media_type==='movie'?'MOVIE':'TV';
const img=opts&&opts.land?backdrop(i.backdrop_path,'w780'):poster(i.poster_path);
const cls=opts&&opts.land?'card land':'card';
return`<div class="${cls}" tabindex="0" onclick="openDt(${i.id},'${i.media_type}')" role="button">
<div class="card-img">
${img?`<img src="${img}" alt="${t}" loading="lazy">`:'<div class="shimmer" style="width:100%;height:100%"></div>'}
<span class="card-badge tp">${tp}</span>
${r!=='N/A'?`<span class="card-badge rt">${svgStar}${r}</span>`:''}
</div>
<div class="card-name">${t}</div>
</div>`;
}

function t10Html(i,rank){
return`<div class="t10" tabindex="0" onclick="openDt(${i.id},'${i.media_type}')" role="button">
<span class="t10-n">${rank}</span>
${cardHtml(i)}
</div>`;
}

/* RENDER SECTION */
function secHtml(name,items,opts){
if(!items||!items.length)return'';
const id='sw-'+name.replace(/\s+/g,'-').toLowerCase()+'-'+Math.random().toString(36).slice(2,6);
let slides;
if(opts&&opts.top10){
slides=items.slice(0,10).map((i,n)=>`<div class="swiper-slide" style="width:auto">${t10Html(i,n+1)}</div>`).join('');
}else{
slides=items.map(i=>`<div class="swiper-slide" style="width:auto">${cardHtml(i,opts)}</div>`).join('');
}
return`<div class="section">
<div class="section-head"><h2 class="section-title">${name}</h2></div>
<div class="swiper row ${id}"><div class="swiper-wrapper">${slides}</div></div>
</div>`;
}

/* RENDER CONTENT */
function renderContent(){
const el=document.getElementById('content');
let h='';
switch(tab){
case'home':
h+=secHtml('Trending Now',D.trending,{land:true});
h+=secHtml('Popular Movies',D.pop_movie);
h+=secHtml('Top 10 Movies',D.top_movie,{top10:true});
h+=secHtml('Now Playing',D.now_playing);
h+=secHtml('Popular TV Shows',D.pop_tv);
h+=secHtml('Top 10 TV Shows',D.top_tv,{top10:true});
h+=secHtml('Anime',D.anime);
h+=secHtml('K-Drama',D.kdrama);
h+=secHtml('Coming Soon',D.upcoming);
h+=secHtml('Airing Today',D.airing);
if(D.genres)for(const[k,v]of Object.entries(D.genres)){
h+=secHtml(k.charAt(0).toUpperCase()+k.slice(1),v)}
break;
case'movies':
h+=secHtml('Popular Movies',D.pop_movie);
h+=secHtml('Top Rated',D.top_movie,{top10:true});
h+=secHtml('Now Playing',D.now_playing);
h+=secHtml('Coming Soon',D.upcoming);
if(D.genres)for(const[k,v]of Object.entries(D.genres)){
const mv=v.filter(i=>i.media_type==='movie');if(mv.length)h+=secHtml(k.charAt(0).toUpperCase()+k.slice(1),mv)}
break;
case'tv':
h+=secHtml('Popular TV Shows',D.pop_tv);
h+=secHtml('Top Rated',D.top_tv,{top10:true});
h+=secHtml('Airing Today',D.airing);
h+=secHtml('K-Drama',D.kdrama);
break;
case'anime':
h+=secHtml('Popular Anime',D.anime);
if(D.genres){const ani=D.genres.animation;if(ani)h+=secHtml('Animation',ani)}
h+=`<div class="section"><div class="section-head"><h2 class="section-title">Browse Anime Sites</h2></div>
<div class="src-grid" style="max-width:500px">
<button class="src-btn" onclick="openExt('https://animekai.to/home')">AnimeKai</button>
<button class="src-btn" onclick="openExt('https://animepahe.pw/')">AnimePahe</button>
<button class="src-btn" onclick="openExt('https://hianime.to/home')">HiAnime</button>
<button class="src-btn" onclick="openExt('https://www.miruro.tv/')">Miruro</button>
</div></div>`;
break;
case'mylist':
const ml=allItems().filter(i=>myList.includes(i.id));
h+=ml.length?secHtml('My List',ml):'<div class="empty"><p>Your list is empty</p><p>Add movies and shows to keep track</p></div>';
break;
}
el.innerHTML=h;
initRows();
}

function initRows(){
document.querySelectorAll('.row').forEach(el=>{
new Swiper(el,{slidesPerView:'auto',spaceBetween:10,freeMode:true,watchOverflow:true,
mousewheel:{forceToAxis:true}});
});
}

/* DETAIL */
window.openDt=function(id,mt){
const i=allItems().find(x=>x.id===id);if(!i)return;cur=i;
document.getElementById('dtBd').src=backdrop(i.backdrop_path,'w1280');
const t=title(i),y=year(i),r=rate(i),g=genres(i),inL=myList.includes(i.id),ani=isAni(i);
let sh='';
if(i.media_type==='tv'){
sh+=`<div class="ep-sel"><select class="s-sel" id="sSel">${
Array.from({length:8},(_,n)=>`<option value="${n+1}">Season ${n+1}</option>`).join('')
}</select><div class="ep-grid" id="epGrid">${
Array.from({length:13},(_,n)=>`<button class="ep-btn${n===0?' on':''}" data-ep="${n+1}" onclick="selEp(this)">${n+1}</button>`).join('')
}</div></div>`;
}
sh+=`<div style="margin-top:18px"><div class="sources-h">Sources</div><div class="src-grid">${
SRCS.map((s,n)=>`<button class="src-btn${n===0?' on':''}" onclick="playSrc(${n})">${s.n}</button>`).join('')
}</div></div>`;
if(ani||i.media_type==='tv'){
sh+=`<div class="anime-h">Anime Sites</div><div class="src-grid">${
ANIME_SRCS.map(s=>`<button class="src-btn" onclick="openAni('${s.u}','${encodeURIComponent(t)}')">${s.n}</button>`).join('')
}</div>`;
}
document.getElementById('dtBody').innerHTML=`
<h1 class="detail-h">${t}</h1>
<div class="detail-meta"><span class="rt">★ ${r}</span><span>${y}</span><span>${i.media_type==='movie'?'Movie':'TV Series'}</span></div>
<div class="detail-genres">${g.map(x=>`<span class="detail-genre">${x}</span>`).join('')}</div>
<p class="detail-desc">${i.overview||'No description available.'}</p>
<div class="detail-acts">
<button class="btn-play" onclick="playSrc(0)">${svgPlay} Play Now</button>
<button class="btn-info" onclick="toggleList(${i.id})">
<svg width="16" height="16" viewBox="0 0 24 24" fill="${inL?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
${inL?'In My List':'Add to List'}</button>
</div>${sh}`;
document.getElementById('detail').classList.add('open');
document.body.style.overflow='hidden';
};

window.closeDt=function(){
document.getElementById('detail').classList.remove('open');
document.body.style.overflow='';
};

window.selEp=function(b){
document.querySelectorAll('.ep-btn').forEach(x=>x.classList.remove('on'));
b.classList.add('on');
};

window.toggleList=function(id){
const idx=myList.indexOf(id);
if(idx===-1)myList.push(id);else myList.splice(idx,1);
localStorage.setItem('fl',JSON.stringify(myList));
if(cur&&cur.id===id)openDt(id,cur.media_type);
if(tab==='mylist')renderContent();
};

/* PLAYER */
window.playSrc=function(n){
if(!cur)return;
const s=SRCS[n],i=cur,t=title(i);
let url;
if(i.media_type==='movie'){url=s.m.replace('{id}',i.id)}
else{
const se=document.getElementById('sSel'),ep=document.querySelector('.ep-btn.on');
const sn=se?se.value:'1',en=ep?ep.dataset.ep:'1';
url=s.t.replace('{id}',i.id).replace('{s}',sn).replace('{e}',en);
}
if(window.TVBridge){window.TVBridge.openEmbed(url);return}
if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.openEmbed){
window.webkit.messageHandlers.openEmbed.postMessage(url);return}
document.getElementById('plFrame').src=url;
document.getElementById('plTi').textContent=t;
document.getElementById('plTabs').innerHTML=SRCS.map((x,j)=>
`<button class="p-tab${j===n?' on':''}" onclick="switchSrc(${j})">${x.n}</button>`).join('');
document.getElementById('player').classList.add('open');
};

window.switchSrc=function(n){playSrc(n)};
window.closePl=function(){
document.getElementById('plFrame').src='';
document.getElementById('player').classList.remove('open');
};

window.openAni=function(tmpl,t){
const url=tmpl.replace('{t}',t);
if(window.TVBridge){window.TVBridge.openEmbed(url);return}
if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.openEmbed){
window.webkit.messageHandlers.openEmbed.postMessage(url);return}
document.getElementById('plFrame').src=url;
document.getElementById('plTi').textContent=decodeURIComponent(t);
document.getElementById('plTabs').innerHTML='';
document.getElementById('player').classList.add('open');
};

window.openExt=function(url){
if(window.TVBridge){window.TVBridge.openEmbed(url);return}
if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.openEmbed){
window.webkit.messageHandlers.openEmbed.postMessage(url);return}
document.getElementById('plFrame').src=url;
document.getElementById('plTi').textContent='';
document.getElementById('plTabs').innerHTML='';
document.getElementById('player').classList.add('open');
};

/* SEARCH */
window.openSr=function(){
document.getElementById('searchOv').classList.add('open');
document.getElementById('searchIn').focus();
document.body.style.overflow='hidden';
};
window.closeSr=function(){
document.getElementById('searchOv').classList.remove('open');
document.getElementById('searchIn').value='';
document.getElementById('searchRes').innerHTML='';
document.body.style.overflow='';
};
let sTo;
document.getElementById('searchIn').addEventListener('input',function(){
clearTimeout(sTo);
sTo=setTimeout(()=>{
const q=this.value.trim().toLowerCase();
if(!q){document.getElementById('searchRes').innerHTML='';return}
const res=allItems().filter(i=>title(i).toLowerCase().includes(q)).slice(0,40);
document.getElementById('searchRes').innerHTML=res.length?
res.map(i=>cardHtml(i)).join(''):
'<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:40px">No results found</div>';
},200);
});

/* TABS */
function switchTab(t){
tab=t;
document.querySelectorAll('.nav-tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===t));
document.querySelectorAll('.mob-item').forEach(x=>x.classList.toggle('on',x.dataset.tab===t));
document.getElementById('hero').style.display=t==='home'?'':'none';
renderContent();
window.scrollTo({top:0,behavior:'smooth'});
}
window.go=function(t){switchTab(t);closeSB()};

/* SIDEBAR */
window.closeSB=function(){
document.getElementById('sidebar').classList.remove('open');
document.getElementById('sbBk').classList.remove('open');
};

/* INIT */
renderHero();renderContent();

window.addEventListener('scroll',()=>{
document.getElementById('nav').classList.toggle('scrolled',window.scrollY>50)});

document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
document.querySelectorAll('.mob-item').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
document.getElementById('searchBtn').addEventListener('click',openSr);
document.getElementById('menuBtn').addEventListener('click',()=>{
document.getElementById('sidebar').classList.add('open');
document.getElementById('sbBk').classList.add('open');
});
document.getElementById('sbBk').addEventListener('click',closeSB);

document.addEventListener('keydown',e=>{
if(e.key==='Escape'){
if(document.getElementById('player').classList.contains('open'))closePl();
else if(document.getElementById('detail').classList.contains('open'))closeDt();
else if(document.getElementById('searchOv').classList.contains('open'))closeSr();
else if(document.getElementById('sidebar').classList.contains('open'))closeSB();
}
if(e.key==='/'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();openSr()}
});
})();
</script>
</body>
</html>
